  <script>
    // Автозапуск для отладки
    window.addEventListener('DOMContentLoaded', () => {
      console.log('DataMatrix Scanner: DOMContentLoaded, вызываем activate()');
      // Небольшая задержка для уверенности, что main.jsx загрузился

    });
